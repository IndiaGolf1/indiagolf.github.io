<h2 class="section-title">
Cyber Newsletter Signup
</h2>

<form class="container">

<label>Name</label>

<input type="text"
       id="username"
       class="form-control">

<label class="mt-3">
Email
</label>

<input type="email"
       class="form-control">

<label class="mt-3">
Select Interest
</label>

<select id="interest"
        class="form-control">

<option>Malware Research</option>

<option>Ransomware</option>

<option>Cyber Defense</option>

<option>Digital Forensics</option>

</select>

<button type="button"
        onclick="saveUserPreference()"
        class="btn btn-success mt-4">

Submit

</button>

</form>

<p id="output"
   class="text-center mt-4"></p>
