<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Report Incident | TechWorm</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="custom-nav">
        <a class="nav-brand" href="index.html">TechWorm</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="types.html">Types & Symptoms</a></li>
            <li><a href="history.html">History</a></li>
            <li><a class="active" href="report.html">Report an Incident</a></li>
        </ul>
    </nav>

    <div class="main-wrapper">
        <div class="flex-container">
            <div class="content-box">
                <h2>Report a Suspected Infection</h2>
                <form id="reportForm" class="entry-form">
                    <label>Your Name</label>
                    <input type="text" id="userName" required>
                    
                    <label>Malware Type</label>
                    <select id="malwareType" required>
                        <option value="">Choose...</option>
                        <option value="Trojan">Trojan</option>
                    </select>

                    <button type="submit" class="submit-btn">Submit Report</button>
                </form>
                <div id="formMessage"></div>
            </div>
            
            <div class="sidebar">
                <img src="img/report.jpg" class="standard-img" alt="Support Team">
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 TechWorm.</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
