<div class="container mt-5">
    <div class="row">
        <div class="col-md-6">
            <h3>Report Incident</h3>
            <form id="reportForm" class="card p-4">
                <input type="text" id="userName" class="form-control mb-3" placeholder="Your Name" required>
                <select id="malwareType" class="form-select mb-3">
                    <option>Virus</option><option>Trojan</option><option>Ransomware</option>
                </select>
                <textarea id="description" class="form-control mb-3" placeholder="Describe symptoms..." required></textarea>
                <button type="submit" class="btn btn-danger">Log Report</button>
            </form>
        </div>
        <div class="col-md-6"><div id="sessionDisplay" class="mt-4"></div></div>
    </div>
</div>
<script src="main.js"></script>
