<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Report | TechWorm</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="nav-header">
        <a href="index.html" class="brand-name">TechWorm</a>
        <div class="menu-links">
            <a href="index.html">Home</a>
            <a href="types.html">Types</a>
            <a href="history.html">History</a>
            <a href="report.html">Report</a>
        </div>
    </nav>

    <div class="page-wrapper">
        <div class="flex-row">
            <div class="text-column">
                <h2>Report an Incident</h2>
                <form id="reportForm">
                    <p>Name:<br><input type="text" id="userName" required></p>
                    <p>Malware Type:<br>
                        <select id="malwareType" required>
                            <option value="Trojan">Trojan</option>
                            <option value="Worm">Worm</option>
                            <option value="Ransomware">Ransomware</option>
                        </select>
                    </p>
                    <p>Description:<br><textarea id="description" rows="5" style="width:100%"></textarea></p>
                    <button type="submit">Submit to TechWorm</button>
                </form>
                <div id="formMessage"></div>
            </div>
            <div class="image-column">
                <img src="images/report.jpg" class="fluid-img" alt="IT Support">
            </div>
        </div>
    </div>

    <footer class="footer-bar">
        <p>&copy; 2026 TechWorm.</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
