<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Incident | TechWorm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">TechWorm</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="types.html">Types & Symptoms</a></li>
                    <li class="nav-item"><a class="nav-link" href="history.html">History</a></li>
                    <li class="nav-item"><a class="nav-link active" href="report.html">Report an Incident</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <div class="row">
            <div class="col-md-6 mb-4">
                <h2>Report a Suspected Infection</h2>
                <form id="reportForm" class="card p-4 shadow-sm">
                    <div class="mb-3">
                        <label for="userName" class="form-label">Your Name</label>
                        <input type="text" class="form-control" id="userName" required>
                    </div>
                    <div class="mb-3">
                        <label for="malwareType" class="form-label">Suspected Malware Type</label>
                        <select class="form-select" id="malwareType" required>
                            <option value="">Choose...</option>
                            <option value="Trojan">Trojan</option>
                            <option value="Worm">Worm</option>
                            <option value="Ransomware">Ransomware</option>
                            <option value="Unknown">Unknown</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Describe the Symptoms</label>
                        <textarea class="form-control" id="description" rows="4" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-danger">Submit Report</button>
                </form>
                <div id="formMessage" class="mt-3"></div>
            </div>
            
            <div class="col-md-6 text-center">
                <img src="img/report.jpg" class="img-fluid rounded shadow mt-5" alt="IT Support Team">
            </div>
        </div>
    </div>

    <footer class="footer fixed-bottom">
        <p>&copy; 2026 TechWorm.</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
