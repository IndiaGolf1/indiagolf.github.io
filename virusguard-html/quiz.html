    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"><span class="navbar-toggler-icon"></span></button>

      <ul class="navbar-nav ms-auto">

<main class="container py-5">
  <h1 class="fw-bold" id="quizTitle">Computer Virus Knowledge Check</h1>
  <p class="text-muted">Your progress is saved in <code>sessionStorage</code> while this tab is open.</p>

  <form onsubmit="submitQuiz(event)" class="mt-4">
    <div class="mb-4">
      <label for="quizName" class="form-label fw-semibold">Your Name</label>
      <input id="quizName" type="text" class="form-control" placeholder="e.g. Alex" required>
    </div>
    <div id="quizQuestions"></div>
    <div class="d-flex flex-wrap gap-2">
      <button type="submit" class="btn btn-success">Submit Answers</button>
      <button type="button" class="btn btn-outline-secondary" onclick="clearQuiz()">Clear Saved Data</button>
    </div>
  </form>

  <div id="quizResult"></div>
  <div id="quizHistoryWrap"></div>
</main>

<footer class="bg-dark text-light py-4 mt-5"><div class="container small text-secondary">© 2026 VirusGuard</div></footer>
