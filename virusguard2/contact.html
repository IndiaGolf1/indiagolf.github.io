<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contact — VirusGuard</title>
<meta name="description" content="Contact the VirusGuard team.">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-shield-shaded text-success me-2"></i>VirusGuard</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"><span class="navbar-toggler-icon"></span></button>
    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="types.html">Types</a></li>
        <li class="nav-item"><a class="nav-link" href="history.html">History</a></li>
        <li class="nav-item"><a class="nav-link" href="prevention.html">Prevention</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="container py-5" style="max-width: 720px;">
  <h1 class="fw-bold">Contact Us</h1>
  <p class="text-muted">Got a question or want to report a suspicious file? Send us a message.</p>

  <form id="contactForm" onsubmit="submitContact(event)" class="mt-4">
    <div class="mb-3">
      <label for="cName" class="form-label">Name</label>
      <input id="cName" type="text" class="form-control" required>
    </div>
    <div class="mb-3">
      <label for="cEmail" class="form-label">Email</label>
      <input id="cEmail" type="email" class="form-control" required>
    </div>
    <div class="mb-3">
      <label for="cTopic" class="form-label">Topic</label>
      <select id="cTopic" class="form-select" required>
        <option value="">Choose a topic…</option>
        <option>General question</option>
        <option>Report suspicious activity</option>
        <option>Feedback</option>
      </select>
    </div>
    <fieldset class="mb-3">
      <legend class="form-label">Severity</legend>
      <div class="form-check form-check-inline"><input class="form-check-input" type="radio" name="severity" id="sLow" value="Low" checked><label class="form-check-label" for="sLow">Low</label></div>
      <div class="form-check form-check-inline"><input class="form-check-input" type="radio" name="severity" id="sMed" value="Medium"><label class="form-check-label" for="sMed">Medium</label></div>
      <div class="form-check form-check-inline"><input class="form-check-input" type="radio" name="severity" id="sHigh" value="High"><label class="form-check-label" for="sHigh">High</label></div>
    </fieldset>
    <div class="mb-3">
      <label for="cMsg" class="form-label">Message</label>
      <textarea id="cMsg" rows="5" class="form-control" required></textarea>
    </div>
    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" id="cSub">
      <label class="form-check-label" for="cSub">Subscribe to monthly security tips</label>
    </div>
    <button type="submit" class="btn btn-success">Send Message</button>
  </form>

  <div id="contactSuccess" class="alert alert-success mt-4 d-none">
    <h4 class="alert-heading">Thanks!</h4>
    <p class="mb-0">Your message has been recorded. We'll respond within 48 hours.</p>
  </div>
</main>

<footer class="bg-dark text-light py-4 mt-5"><div class="container small text-secondary">© 2026 VirusGuard</div></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
